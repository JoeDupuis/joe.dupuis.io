      <h1 class="page__title">Contact</h1>

<p>Want to get in touch?</p>

<form class="form" action="https://formspree.io/mzbjgeko" method="POST">
  <input type="hidden" name="_next" value="/contact-sent.html">
  <div class="form__field">
    <label class="form__label" for="name">Name</label>
    <input class="form__input" type="text" id="name" name="name" required >
  </div>
  <div class="form__field">
    <label class="form__label" for="email">Email</label>
    <input class="form__input" type="email" id="email" name="_replyto" required >
  </div>
  <div class="form__field">
    <label class="form__label" for="subject">Subject</label>
    <input class="form__input" type="text" id="subject" name="_subject" required >
  </div>
  <div class="form__field">
    <label class="form__label" for="message">Message</label>
    <textarea class="form__textarea" id="message" name="message" rows="10" required ></textarea>
  </div>
  <input type="text" name="_gotcha" style="display:none" />
  <div class="form__actions">
    <input data-target="contact-form.submit"class="form__submit" type="submit" value="Send">
  </div>
</form>
